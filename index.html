<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오늘 할 일</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=DotGothic16&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">

    <header class="top-bar">
      <h1 class="dot-title">
        <span class="dc dc1">오</span><span class="dc dc2">늘</span>
        <span class="dc-gap"></span>
        <span class="dc dc3">할</span>
        <span class="dc-gap"></span>
        <span class="dc dc4">일</span>
      </h1>
      <div class="user-info hidden" id="user-info">
        <span class="user-email" id="user-email"></span>
        <button class="signout-btn" id="signout-btn" aria-label="로그아웃">
          <span class="material-icons-round">logout</span>
        </button>
      </div>
    </header>

    <!-- 인증 뷰 (초기 표시) -->
    <div id="auth-view" class="main">
      <div class="md-card auth-card">
        <div class="auth-tabs">
          <button class="auth-tab auth-tab-selected" data-mode="signin" type="button">로그인</button>
          <button class="auth-tab" data-mode="signup" type="button">회원가입</button>
        </div>
        <div class="text-field">
          <input type="email" id="auth-email" placeholder=" " autocomplete="email">
          <label for="auth-email">이메일</label>
        </div>
        <div class="text-field">
          <input type="password" id="auth-password" placeholder=" " autocomplete="current-password">
          <label for="auth-password">비밀번호</label>
        </div>
        <p class="auth-message" id="auth-message"></p>
        <button id="auth-btn" class="auth-submit-btn" type="button">
          <span class="material-icons-round">login</span>
          <span id="auth-btn-label">로그인</span>
        </button>

        <div class="oauth-divider"><span>또는</span></div>

        <div class="oauth-buttons">
          <button class="oauth-btn oauth-google" type="button" id="google-btn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Google로 계속하기
          </button>
          <button class="oauth-btn oauth-github" type="button" id="github-btn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.17 6.839 9.49.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0 1 12 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.167 22 16.418 22 12c0-5.523-4.477-10-10-10z"/>
            </svg>
            GitHub로 계속하기
          </button>
        </div>
      </div>
    </div>

    <!-- 투두 뷰 (로그인 후 표시) -->
    <div id="todo-view" class="main hidden">
      <div class="add-card md-card">
        <div class="text-field">
          <input type="text" id="todo-input" placeholder=" " autocomplete="off">
          <label for="todo-input">할 일을 입력하세요</label>
        </div>
        <div class="bottom-row">
          <div class="chip-group" id="priority-chips">
            <button class="chip" data-value="high" type="button">
              <span class="chip-dot dot-high"></span>높음
            </button>
            <button class="chip chip-selected" data-value="medium" type="button">
              <span class="chip-dot dot-medium"></span>중간
            </button>
            <button class="chip" data-value="low" type="button">
              <span class="chip-dot dot-low"></span>낮음
            </button>
          </div>
          <button id="add-btn" class="fab-btn" type="button" aria-label="추가">
            <span class="material-icons-round">add</span>
          </button>
        </div>
      </div>

      <ul id="todo-list"></ul>

      <div class="empty-state" id="empty-state">
        <div class="empty-icon">🌸</div>
        <p class="empty-title">할 일이 없어요!</p>
        <p class="empty-sub">위에서 새 할 일을 추가해보세요 ✨</p>
      </div>
    </div>

  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
